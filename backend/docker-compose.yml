version: '3.8'

services:
  backend:
    build: .
    container_name: hotelsys_backend
    environment:
      DATABASE_URL: mysql+pymysql://root:rootpassword@host.docker.internal:3306/hotelsys
      SECRET_KEY: supersecretkey123456789
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    ports:
      - "7999:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app

# Using existing MySQL container (mysql-db) on port 3306
# Database 'hotelsys' needs to be created inside the MySQL container