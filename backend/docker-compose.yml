services:
  backend:
    build: .
    container_name: hotelsys_backend
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./database/:/database

# Using existing MySQL container (mysql-db) on port 3306
# Database 'hotelsys' needs to be created inside the MySQL container
